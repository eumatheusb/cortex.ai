  contrast_verified:
    - pair: "signal (#4D71FA) on white (#F7F9FC)"
      ratio: "4.8:1"
      status: pass
    - pair: "white (#F7F9FC) on void (#090E1A)"
      ratio: "18.9:1"
      status: pass
    - pair: "mist (#94A3B8) on void (#090E1A)"
      ratio: "5.2:1"
