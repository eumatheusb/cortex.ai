<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Deck — 12 CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(#1E2533 .5px,transparent .5px),linear-gradient(90deg,#1E2533 .5px,transparent .5px);background-size:80px 80px;opacity:.04}
.bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:#4D71FA}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:64px;color:#F7F9FC;text-align:center;position:relative;z-index:1}
.contacts{margin-top:48px;display:flex;gap:48px;position:relative;z-index:1}
.contact{text-align:center}
.contact-label{font-family:'Inter',sans-serif;font-size:14px;color:#94A3B8;margin-bottom:4px}
.contact-value{font-family:'JetBrains Mono',monospace;font-size:18px;color:#F7F9FC}
.contact-value a{color:#4D71FA;text-decoration:none}
.logo{margin-top:64px;position:relative;z-index:1}
.logo svg{height:40px;width:auto}
</style>
</head>
<body>
<div class="grid"></div>
<h1>Vamos conversar?</h1>
<div class="contacts">
  <div class="contact"><div class="contact-label">Email</div><div class="contact-value"><a href="mailto:contato@cortex.com.br">contato@cortex.com.br</a></div></div>
  <div class="contact"><div class="contact-label">WhatsApp</div><div class="contact-value"><a href="#">(11) 99999-0000</a></div></div>
  <div class="contact"><div class="contact-label">Site</div><div class="contact-value"><a href="#">cortex.com.br</a></div></div>
</div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none">
    <defs><radialGradient id="d12" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#d12)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
    <text x="80" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" letter-spacing="0.8" fill="#F7F9FC">Cortex</text>
  </svg>
</div>
<div class="bar"></div>
</body>
</html>
