<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Deck — 01 Cover</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:#090E1A;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(#1E2533 .5px,transparent .5px),linear-gradient(90deg,#1E2533 .5px,transparent .5px);background-size:80px 80px;opacity:.06}
.logo svg{height:56px;width:auto}
h1{font-weight:700;font-size:64px;color:#F7F9FC;margin-top:40px;letter-spacing:-.02em}
.sub{font-family:'Inter',sans-serif;font-weight:400;font-size:22px;color:#94A3B8;margin-top:16px}
.bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:#4D71FA}
</style>
</head>
<body>
<div class="grid"></div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none">
    <defs><radialGradient id="d1" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#d1)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
    <text x="80" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" letter-spacing="0.8" fill="#F7F9FC">Cortex</text>
  </svg>
</div>
<h1>Do lead ao lucro. Um sistema.</h1>
<div class="sub">Stack completa de crescimento para clinicas odontologicas</div>
<div class="bar"></div>
</body>
</html>
