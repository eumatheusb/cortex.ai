<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>

body{width:1920px;height:1080px;overflow:hidden;background:#090E1A;display:flex;align-items:center;justify-content:center;position:relative}

<div class="content">
