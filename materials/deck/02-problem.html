<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Deck — 02 Problem</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;overflow:hidden;background:#090E1A;display:flex;align-items:center;padding:0 160px;position:relative}
.bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:#4D71FA}
.label{font-family:'Inter',sans-serif;font-size:14px;font-weight:400;color:#4D71FA;text-transform:uppercase;letter-spacing:2px;margin-bottom:24px}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:56px;color:#F7F9FC;line-height:1.2;max-width:1200px}
h1 span{color:#94A3B8;font-weight:400}
.stats{display:flex;gap:64px;margin-top:64px}
.stat{display:flex;flex-direction:column}
.stat-value{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:48px;color:#F43F5E}
.stat-label{font-family:'Inter',sans-serif;font-size:16px;color:#94A3B8;margin-top:8px;max-width:200px}
</style>
</head>
<body>
<div>
  <div class="label">O problema</div>
  <h1>O mercado vende pecas. <span>Voce precisa de um sistema.</span></h1>
  <div class="stats">
    <div class="stat"><div class="stat-value">4+</div><div class="stat-label">fornecedores para gerenciar marketing</div></div>
    <div class="stat"><div class="stat-value">73%</div><div class="stat-label">dos leads se perdem entre ferramentas</div></div>
    <div class="stat"><div class="stat-value">0</div><div class="stat-label">visao integrada do ROI real</div></div>
  </div>
</div>
<div class="bar"></div>
</body>
</html>
