<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cortex Email Footer</title>
<!--[if mso]><style>table,td{font-family:Arial,sans-serif!important}</style><![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#0C1220;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#0C1220;">
  <tr>
    <td align="center" style="padding:0;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;background-color:#0C1220;">
        <!-- Separator -->
        <tr>
          <td style="padding:0 32px;">
            <div style="height:1px;background-color:#1E2533;"></div>
          </td>
        </tr>
        <!-- Logo -->
        <tr>
          <td align="center" style="padding:32px 32px 16px;">
            <!--[if !mso]><!-->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 52" width="80" height="16" role="img" aria-label="Cortex" style="display:block;">
              <text x="0" y="40" font-family="'Space Grotesk','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="700" font-size="44" letter-spacing="1" fill="#F7F9FC">Cortex</text>
              <circle cx="170" cy="12" r="4" fill="#4D71FA"/>
            </svg>
            <!--<![endif]-->
          </td>
        </tr>
        <!-- Social icons -->
        <tr>
          <td align="center" style="padding:0 32px 16px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="padding:0 8px;">
                  <a href="https://instagram.com/cortex" style="text-decoration:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                  </a>
                </td>
                <td style="padding:0 8px;">
                  <a href="https://linkedin.com/company/cortex" style="text-decoration:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Separator -->
        <tr>
          <td style="padding:0 32px;">
            <div style="height:1px;background-color:#1E2533;"></div>
          </td>
        </tr>
        <!-- Address -->
        <tr>
          <td align="center" style="padding:16px 32px 8px;font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;color:#4A5568;line-height:1.5;">
            Cortex | Grupo Fabio Avelar | Sao Paulo, SP
          </td>
        </tr>
        <!-- Unsubscribe -->
        <tr>
          <td align="center" style="padding:0 32px 32px;font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;line-height:1.5;">
            <a href="#preferences" style="color:#94A3B8;text-decoration:underline;">Gerenciar preferencias</a>
            <span style="color:#4A5568;"> | </span>
            <a href="#unsubscribe" style="color:#94A3B8;text-decoration:underline;">Cancelar inscricao</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
