<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Social — Metric Post 1080x1080</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.metric{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:120px;color:#4D71FA;text-shadow:0 0 40px rgba(77,113,250,.25)}
.label{font-family:'Inter',sans-serif;font-weight:400;font-size:22px;color:#94A3B8;margin-top:16px;text-align:center;max-width:600px}
.hashtag{font-family:'Inter',sans-serif;font-weight:400;font-size:14px;color:#4A5568;margin-top:32px}
.logo{position:absolute;bottom:60px;left:50%;transform:translateX(-50%)}
.logo svg{height:16px;width:auto}
</style>
</head>
<body>
<div class="metric">23,4%</div>
<div class="label">taxa de conversao media dos clientes Cortex</div>
<div class="hashtag">#CortexCRM #DoLeadAoLucro</div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 52" fill="none">
    <text x="0" y="40" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="44" letter-spacing="1" fill="#F7F9FC">Cortex</text>
    <circle cx="170" cy="12" r="4" fill="#4D71FA"/>
  </svg>
</div>
</body>
</html>
