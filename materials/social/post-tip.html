<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.card{background:#1B2845;border:1px solid #1E2533;border-radius:12px;padding:40px;margin:0 60px;max-width:900px}

.card-body strong{color:#F7F9FC;font-weight:500}
.logo{position:absolute;bottom:60px;left:50%;transform:translateX(-50%)}
.logo svg{height:16px;width:auto}
</style>
</head>
<body>
<div class="card">
  <div class="card-title">3 sinais de que seu CRM esta te sabotando</div>
  <div class="card-body">

    <strong>2.</strong> Leads novos ficam sem resposta por mais de 2 horas.<br><br>
    <strong>3.</strong> O relatorio mensal depende de uma planilha manual.
  </div>
</div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 52" fill="none">
    <text x="0" y="40" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="44" letter-spacing="1" fill="#F7F9FC">Cortex</text>
    <circle cx="170" cy="12" r="4" fill="#4D71FA"/>
  </svg>
</div>
</body>
</html>
