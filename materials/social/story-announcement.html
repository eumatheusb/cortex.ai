<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Cortex Social — Story Announcement 1080x1920</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(var(--s,#1E2533) .5px,transparent .5px),linear-gradient(90deg,var(--s,#1E2533) .5px,transparent .5px);background-size:64px 64px;opacity:.06}
.logo-icon{margin-top:300px}
.logo-icon svg{width:40px;height:40px}
.badge{margin-top:40px;background:#4D71FA;color:#F7F9FC;font-family:'Inter',sans-serif;font-weight:500;font-size:14px;padding:6px 16px;border-radius:100px}
.headline{margin-top:60px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;color:#F7F9FC;text-align:center;line-height:1.2;padding:0 80px}
.body-text{margin-top:24px;font-family:'Inter',sans-serif;font-weight:400;font-size:18px;color:#94A3B8;text-align:center;line-height:1.6;padding:0 100px;max-width:900px}
.cta-text{position:absolute;bottom:300px;font-family:'Inter',sans-serif;font-weight:500;font-size:16px;color:#94A3B8}
</style>
</head>
<body>
<div class="grid"></div>
<div class="logo-icon">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs><radialGradient id="bgs" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#bgs)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
  </svg>
</div>
<div class="badge">Novidade</div>
<div class="headline">Cortex Flow agora com integracao WhatsApp Business</div>
<div class="body-text">Follow-up automatico, respostas inteligentes e rastreamento completo da conversa dentro do CRM.</div>
<div class="cta-text">Saiba mais</div>
</body>
</html>
