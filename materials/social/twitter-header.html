<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Twitter Header — 1500x500</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1500px;height:500px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(var(--s,#1E2533) .5px,transparent .5px),linear-gradient(90deg,var(--s,#1E2533) .5px,transparent .5px);background-size:64px 64px;opacity:.05}
.logo svg{height:32px;width:auto}
.tagline{font-family:'Inter',sans-serif;font-weight:400;font-size:16px;color:#94A3B8;margin-top:16px}
</style>
</head>
<body>
<div class="grid"></div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 52" fill="none">
    <text x="0" y="40" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="44" letter-spacing="1" fill="#F7F9FC">Cortex</text>
    <circle cx="170" cy="12" r="4" fill="#4D71FA"/>
  </svg>
</div>
<div class="tagline">Do lead ao lucro. Um sistema. Zero fragmentacao.</div>
</body>
</html>
