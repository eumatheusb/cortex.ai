<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Google Display — 160x600 Wide Skyscraper</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:160px;height:600px;overflow:hidden;background:#090E1A;border:1px solid #1E2533;display:flex;flex-direction:column;align-items:center;padding:24px 16px;position:relative}
.logo svg{width:24px;height:24px}
.headline{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#F7F9FC;text-align:center;line-height:1.2;margin-top:60px}
.metric-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.metric{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:36px;color:#4D71FA}
.metric-label{font-family:'Inter',sans-serif;font-weight:400;font-size:13px;color:#94A3B8;margin-top:4px}
.cta{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Inter',sans-serif;font-weight:600;font-size:12px;color:#F7F9FC;background:#4D71FA;padding:8px 16px;border-radius:4px;white-space:nowrap}
</style>
</head>
<body>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs><radialGradient id="bg9" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#bg9)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
  </svg>
</div>
<div class="headline">Do lead ao lucro. Um sistema.</div>
<div class="metric-area">
  <div class="metric">+230%</div>
  <div class="metric-label">faturamento</div>
</div>
<div class="cta">Saiba mais</div>
</body>
</html>
