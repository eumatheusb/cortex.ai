<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Google Display — 728x90 Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:728px;height:90px;overflow:hidden;background:#090E1A;border:1px solid #1E2533;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo svg{width:20px;height:20px}
.headline{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#F7F9FC;flex:1;text-align:center;padding:0 24px}
.cta{font-family:'Inter',sans-serif;font-weight:600;font-size:12px;color:#F7F9FC;background:#4D71FA;padding:6px 14px;border-radius:4px;white-space:nowrap}
</style>
</head>
<body>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs><radialGradient id="bg7" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#bg7)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
  </svg>
</div>
<div class="headline">Do lead ao lucro. Sistema completo para clinicas.</div>
<div class="cta">Saiba mais</div>
</body>
</html>
