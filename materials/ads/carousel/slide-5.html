<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Carousel — Slide 5 CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:#4D71FA}
.logo{margin-bottom:32px}
.logo svg{height:40px;width:auto;filter:drop-shadow(0 0 60px rgba(77,113,250,.15))}
.cta-text{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:28px;color:#F7F9FC;text-align:center;margin-top:32px}
.url{font-family:'Inter',sans-serif;font-weight:500;font-size:18px;color:#4D71FA;margin-top:16px}
</style>
</head>
<body>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none">
    <defs><radialGradient id="ib5" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#ib5)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
    <text x="80" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" letter-spacing="0.8" fill="#F7F9FC">Cortex</text>
  </svg>
</div>
<div class="cta-text">Agende uma demonstracao gratuita</div>
<div class="url">cortex.com.br</div>
<div class="bar"></div>
</body>
</html>
