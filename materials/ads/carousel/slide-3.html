<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Carousel — Slide 3 Solution</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative}
.bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:#4D71FA}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:48px;color:#F7F9FC;line-height:1.2;margin-bottom:32px}
.features{display:flex;flex-direction:column;gap:20px}
.feature{display:flex;align-items:center;gap:16px;font-family:'Inter',sans-serif;font-weight:500;font-size:20px;color:#F7F9FC}
.dash{width:24px;height:3px;background:#4D71FA;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>
<h1>Um sistema.<br>Do lead ao lucro.</h1>
<div class="features">
  <div class="feature"><div class="dash"></div>CRM proprietario</div>
  <div class="feature"><div class="dash"></div>Trafego integrado</div>
  <div class="feature"><div class="dash"></div>IA de qualificacao</div>
  <div class="feature"><div class="dash"></div>Analytics unificado</div>
</div>
<div class="bar"></div>
</body>
</html>
