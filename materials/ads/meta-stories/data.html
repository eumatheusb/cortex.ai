<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Story — Data Cascade 1080x1920</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;background:#090E1A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:120px}
.metric{text-align:center}
.metric .value{font-family:'JetBrains Mono',monospace}
.m1 .value{font-weight:500;font-size:32px;color:#4A5568}
.m2 .value{font-weight:600;font-size:44px;color:#94A3B8}
.m3 .value{font-weight:700;font-size:64px;color:#4D71FA;text-shadow:0 0 32px rgba(77,113,250,.2)}
.m3 .label{font-family:'Inter',sans-serif;font-weight:400;font-size:16px;color:#94A3B8;margin-top:12px}
.logo{position:absolute;bottom:300px;left:50%;transform:translateX(-50%)}
.logo svg{height:16px;width:auto}
</style>
</head>
<body>
<div class="metric m1"><div class="value">1.247 leads</div></div>
<div class="metric m2"><div class="value">23% conversao</div></div>
<div class="metric m3">
  <div class="value">R$ 487K</div>
  <div class="label">faturamento operado pelo Cortex</div>
</div>
<div class="logo">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 52" fill="none">
    <text x="0" y="40" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="44" letter-spacing="1" fill="#F7F9FC">Cortex</text>
    <circle cx="170" cy="12" r="4" fill="#4D71FA"/>
  </svg>
</div>
</body>
</html>
