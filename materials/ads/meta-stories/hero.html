<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Story — Hero 1080x1920</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;background:#090E1A;position:relative;display:flex;flex-direction:column;align-items:center}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(90deg,#1E2533 1px,transparent 1px);background-size:40px 40px;opacity:.06}
.logo-icon{margin-top:280px}
.logo-icon svg{width:40px;height:40px}
.headline-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 60px}
h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:48px;color:#F7F9FC;line-height:1.2;max-width:900px}
h1 span{color:#4D71FA}
.cta-hint{margin-bottom:280px;font-family:'Inter',sans-serif;font-weight:500;font-size:16px;color:#94A3B8}
</style>
</head>
<body>
<div class="grid-lines"></div>
<div class="logo-icon">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <defs><radialGradient id="bd" cx="40%" cy="40%" r="65%"><stop offset="0%" stop-color="#1B2845"/><stop offset="100%" stop-color="#090E1A"/></radialGradient></defs>
    <rect width="64" height="64" rx="14" fill="url(#bd)"/>
    <path d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4" stroke="#4D71FA" stroke-width="5" stroke-linecap="round"/>
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
  </svg>
</div>
<div class="headline-area">
  <h1>Voce nao precisa de mais uma ferramenta.<br><span>Precisa de um sistema que funcione.</span></h1>
</div>
<div class="cta-hint">Conhecer o Cortex</div>
</body>
</html>
