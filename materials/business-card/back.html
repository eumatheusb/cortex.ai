<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cortex Business Card — Back (90x50mm / 1063x591px)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1063px;height:591px;overflow:hidden;background:#090E1A;display:flex;align-items:center;justify-content:space-between;padding:64px;position:relative}
.left{display:flex;flex-direction:column;gap:16px}
.contact-item{display:flex;align-items:center;gap:12px}
.contact-item svg{width:16px;height:16px;stroke:#4D71FA;stroke-width:1.5;fill:none;flex-shrink:0}
.contact-item span{font-family:'JetBrains Mono',monospace;font-size:14px;color:#94A3B8}
.tagline{font-family:'Inter',sans-serif;font-weight:400;font-size:12px;color:#4A5568;margin-top:16px}
.right{display:flex;flex-direction:column;align-items:center;gap:16px}
.qr{width:120px;height:120px;background:#1B2845;border:1px solid #1E2533;border-radius:8px;display:flex;align-items:center;justify-content:center}
.qr span{font-family:'Inter',sans-serif;font-size:11px;color:#4A5568}
.accent{position:absolute;top:0;left:0;right:0;height:3px;background:#4D71FA}
</style>
</head>
<body>
<div class="accent"></div>
<div class="left">
  <div class="contact-item">
    <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <span>(11) 99999-0000</span>
  </div>
  <div class="contact-item">
    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    <span>fabio@cortex.com.br</span>
  </div>
  <div class="contact-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span>cortex.com.br</span>
  </div>
  <div class="tagline">Do lead ao lucro. Um sistema. Zero fragmentacao.</div>
</div>
<div class="right">
  <div class="qr"><span>QR Code</span></div>
</div>
</body>
</html>
