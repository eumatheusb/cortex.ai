    acceptance_criteria:
      - "Suporta 4 dígitos e 6 dígitos (configurável via prop length)"
      - "Auto-foco no próximo campo ao digitar cada dígito"
      - "Suporte a colar (paste) o código completo em qualquer campo"
      - "Backspace move foco para campo anterior e limpa valor"
      - "Estado de erro com mensagem e borda vermelha"
      - "Estado de sucesso com borda verde"
      - "Conformidade WCAG AA: aria-label por campo, role=group"
      - "Story no Storybook: 4 dígitos, 6 dígitos, estado de erro"
    story_points: 5
    labels: ["design-system", "component", "accessibility", "auth"]
    depends_on: []

