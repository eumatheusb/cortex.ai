schema_version: "1.0"
generated: "2026-03-22"
product: "CORTEX"
description: >
  Backlog visual completo do produto Cortex — CRM/sistema operacional para dentistas.
  Design System com 35 componentes, 52 tokens DTCG, Storybook configurado, brandbook completo.
  Organizado em 4 épicos: DS-PROD (prioridade alta), DS-QUALITY (média), DS-MATURITY (baixa), BRAND-APP (alta).

epics:
  - id: "DS-PROD"
    name: "Design System Production Ready"
    priority: alta
    description: >
      Novos componentes e infraestrutura necessários para o DS Cortex atingir
      maturidade de produção como SaaS. Inclui light mode, componentes faltantes,
      charts e sincronização do registry.

  - id: "DS-QUALITY"
    name: "Design System Quality & DX"
    priority: media
    description: >
      Cobertura de testes, automação de qualidade visual, pipeline de build npm
      e deploy público do Storybook.

  - id: "DS-MATURITY"
    name: "Design System Maturity"
    priority: baixa
    description: >
      Figma Code Connect, email templates, tokens avançados, changelog,
      analytics de uso de tokens e site de documentação.

  - id: "BRAND-APP"
    name: "Brand Application Cortex"
    priority: alta
    description: >
      Aplicação da marca Cortex em todos os pontos de contato: digital (mockups,
      ads, social media), físico (vestuário, brindes) e ambiental (eventos, materiais).

stories:

  # ═══════════════════════════════════════════════════════════════════
  # ÉPICO 1 — DS-PROD: Design System Production Ready
  # ═══════════════════════════════════════════════════════════════════

  - id: "CORTEX-001"
    title: "Light Mode Theme"
    epic: "DS-PROD"
    priority: alta
    type: feature
    description: >
      Como desenvolvedor SaaS usando o Cortex DS, quero um tema light mode completo
      para que o produto possa ser utilizado em contextos de alta luminosidade e
      atender preferências de usuários que não preferem dark mode.
    acceptance_criteria:
      - "Todos os 35 componentes existentes renderizam corretamente em light mode sem quebras visuais"
      - "Tokens de cor light mode definidos no DTCG (backgrounds, surfaces, borders, text, semantic)"
      - "Toggle theme (dark/light) funcional via CSS custom properties sem flash"
      - "Contraste WCAG AA verificado para todos os pares de cor do light mode"
      - "Story no Storybook com switcher dark/light em cada componente"
      - "Variável CSS --cortex-mode: light | dark aplicada no :root"
      - "Documentação dos novos tokens light no DESIGN-SYSTEM.md"
    story_points: 13
    labels: ["design-system", "theming", "accessibility", "tokens"]
    depends_on: []

  - id: "CORTEX-002"
    title: "DatePicker Component"
    epic: "DS-PROD"
    priority: alta
    type: feature
    description: >
      Como dentista usando o Cortex CRM, quero um componente DatePicker acessível
      para selecionar datas de consultas e agendamentos de forma intuitiva e
      compatível com teclado e leitores de tela.
    acceptance_criteria:
      - "Suporta modo single date e range (data inicial + data final)"
      - "Locale pt-BR configurado (dias da semana, meses, formato DD/MM/AAAA)"
      - "Construído sobre Radix UI ou React-Day-Picker com tokens Cortex"
      - "Navegação completa por teclado (Tab, Arrow keys, Enter, Escape)"
      - "Conformidade WCAG AA: roles ARIA corretos, labels, live regions"
      - "Integra com React Hook Form via Controller"
      - "Story no Storybook: single, range, disabled dates, min/max date"
      - "Variante read-only para exibição de datas sem edição"
    story_points: 8
    labels: ["design-system", "component", "accessibility", "forms"]
    depends_on: []

  - id: "CORTEX-003"
    title: "Combobox/Autocomplete Component"
    epic: "DS-PROD"
    priority: alta
    type: feature
    description: >
      Como recepcionista usando o CRM Cortex, quero um componente Combobox com
      busca para encontrar pacientes rapidamente e associá-los a consultas sem
      precisar digitar o nome completo.
    acceptance_criteria:
      - "Suporta busca síncrona (lista local) e assíncrona (API fetch com debounce)"
      - "Multi-select: seleção de múltiplos itens com chips removíveis"
      - "Navegação por teclado completa (Arrow, Enter, Escape, Tab)"
      - "Conformidade ARIA: role=combobox, aria-expanded, aria-autocomplete"
      - "Estado de loading enquanto dados assíncronos carregam"
      - "Estado empty (nenhum resultado encontrado)"
      - "Story com dados reais de CRM: busca de pacientes por nome"
      - "Limpa seleção com botão X ou tecla Backspace"
    story_points: 8
    labels: ["design-system", "component", "accessibility", "forms", "crm"]
    depends_on: []

  - id: "CORTEX-004"
    title: "FileUpload Component"
    epic: "DS-PROD"
    priority: media
    type: feature
    description: >
      Como dentista, quero fazer upload de documentos e imagens de pacientes
      (prontuários, radiografias, fotos) diretamente no CRM com interface
      intuitiva de arrastar e soltar.
    acceptance_criteria:
      - "Drag-and-drop nativo com highlight visual na zona de drop"
      - "Click-to-browse via input file oculto"
      - "Preview de imagens (JPG, PNG, WebP) em thumbnail antes do upload"
      - "Preview de PDFs com ícone + nome do arquivo"
      - "Progress bar animada durante upload"
      - "Validação de tipo de arquivo e tamanho máximo configurável"
      - "Estado de erro para arquivos inválidos ou upload falho"
      - "Múltiplos arquivos suportados com lista de uploads"
      - "Conformidade WCAG AA: label, aria-label, keyboard-operable"
      - "Story no Storybook com mock de upload assíncrono"
    story_points: 8
    labels: ["design-system", "component", "accessibility", "forms"]
    depends_on: []

  - id: "CORTEX-005"
    title: "Slider Component"
    epic: "DS-PROD"
    priority: baixa
    type: feature
    description: >
      Como desenvolvedor construindo features do Cortex, quero um componente
      Slider acessível para configurações de valores numéricos como faixas de
      preço de tratamentos ou filtros de relatório.
    acceptance_criteria:
      - "Modo single (um valor) e range (dois valores: min e max)"
      - "Step configurável (ex: step=5, step=100)"
      - "Labels opcionais acima do thumb mostrando valor atual"
      - "Marcações (ticks) opcionais em intervalos configuráveis"
      - "Construído sobre Radix UI Slider"
      - "Navegação por teclado (Arrow keys, Home, End)"
      - "Conformidade WCAG AA: role=slider, aria-valuemin/max/now"
      - "Story no Storybook: single, range, com step, com labels"
    story_points: 5
    labels: ["design-system", "component", "accessibility"]
    depends_on: []

  - id: "CORTEX-006"
    title: "TimePicker Component"
    epic: "DS-PROD"
    priority: alta
    type: feature
    description: >
      Como recepcionista, quero um seletor de horário para agendar consultas
      com precisão de 15 minutos, integrado ao DatePicker, para que o fluxo
      de agendamento seja fluido e sem erros.
    acceptance_criteria:
      - "Suporta formato 24h e AM/PM configurável"
      - "Step de 15 minutos padrão, configurável (5, 10, 15, 30, 60)"
      - "Integração com DatePicker: compõe um DateTime completo"
      - "Máscara de input com formatação automática HH:MM"
      - "Navegação por teclado nos dropdowns de hora/minuto"
      - "Conformidade WCAG AA"
      - "Story no Storybook: 24h, AM/PM, integrado com DatePicker"
      - "Bloqueia horários passados quando data é hoje (opcional)"
    story_points: 5
    labels: ["design-system", "component", "accessibility", "forms", "crm"]
    depends_on: ["CORTEX-002"]

  - id: "CORTEX-007"
    title: "OTP Input Component"
    epic: "DS-PROD"
    priority: media
    type: feature
    description: >
      Como usuário do Cortex, quero um campo de entrada de código OTP para
      verificar minha identidade no login de dois fatores de forma rápida
