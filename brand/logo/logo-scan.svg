<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="sc-bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>

    <!-- Beam gradient: fades in and out horizontally -->
    <linearGradient id="sc-beam-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4D71FA" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4D71FA" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#F7F9FC" stop-opacity="0.35"/>
      <stop offset="70%"  stop-color="#4D71FA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4D71FA" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip to logo bounds -->
    <clipPath id="sc-clip">
      <rect width="264" height="64"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');

      /* Scanline moves left → right, repeats every 3.5s with 1s pause */
      .sc-beam {
        animation: sc-sweep 3.5s cubic-bezier(0.4,0,0.6,1) 0.5s infinite;
      }

      /* Logo elements dim slightly before each scan pass */
      .sc-logo {
        animation: sc-dim 3.5s ease-in-out 0.5s infinite;
      }

      /* Horizontal hairline that leads the beam */
      .sc-line {
        animation: sc-line-move 3.5s cubic-bezier(0.4,0,0.6,1) 0.5s infinite;
      }

      @keyframes sc-sweep {
        0%   { transform: translateX(-80px);  }
        60%  { transform: translateX(310px);  }
        100% { transform: translateX(310px);  }
      }

      @keyframes sc-line-move {
        0%   { transform: translateX(-80px);  opacity: 0;   }
        5%   { opacity: 0.9; }
        55%  { opacity: 0.9; }
        60%  { transform: translateX(310px);  opacity: 0;   }
        100% { transform: translateX(310px);  opacity: 0;   }
      }

      @keyframes sc-dim {
        0%,5%   { opacity: 0.55; }
        45%,100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#sc-bg)"/>

  <!-- Logo elements (slightly dimmed while scan runs) -->
  <g class="sc-logo">
    <path
      d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4"
      stroke="#4D71FA" stroke-width="5" stroke-linecap="round"
    />
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
    <text x="80" y="44"
      font-family="'Space Grotesk','Arial Black',sans-serif"
      font-weight="700" font-size="36" letter-spacing="0.8"
      fill="#F7F9FC"
    >Cortex</text>
  </g>

  <!-- Scan beam overlay (mix-blend-mode: screen brightens beneath) -->
  <g clip-path="url(#sc-clip)" style="mix-blend-mode: screen">
    <rect
      class="sc-beam"
      x="-80" y="0" width="80" height="64"
      fill="url(#sc-beam-grad)"
    />
  </g>

  <!-- Leading hairline -->
  <rect
    class="sc-line"
    x="-80" y="0" width="1.5" height="64"
    fill="#4D71FA" opacity="0.8"
  />
</svg>
