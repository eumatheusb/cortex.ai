<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="icon-bg-v" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
  </style>

  <!-- Icon — centered horizontally (x=38 to center 64px in 140px) -->
  <rect x="38" y="0" width="64" height="64" rx="14" fill="url(#icon-bg-v)"/>
  <path
    d="M 80.6,42.6 A 15,15 0 1,1 80.6,21.4"
    stroke="#4D71FA"
    stroke-width="5"
    stroke-linecap="round"
  />
  <circle cx="93" cy="32" r="2.5" fill="#4D71FA"/>

  <!-- Wordmark — centered below icon, gap 16px -->
  <text
    x="70"
    y="106"
    text-anchor="middle"
    font-family="'Space Grotesk', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="32"
    letter-spacing="0.8"
    fill="#F7F9FC"
  >Cortex</text>
</svg>
