  <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>

  <!-- Wordmark — dark on light bg -->
  <text
    x="80"
    y="44"
    font-family="'Space Grotesk', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="36"
    letter-spacing="0.8"
    fill="#090E1A"
  >Cortex</text>
