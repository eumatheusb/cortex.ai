<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="bg-dark" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg-dark)"/>

  <!-- C arc — center (32,32), r=15, gap ±45° on right side -->
  <!-- Start: (32+15·cos45°, 32+15·sin45°) = (42.6, 42.6) -->
  <!-- End:   (32+15·cos-45°, 32+15·sin-45°) = (42.6, 21.4) -->
  <!-- Clockwise large arc = C shape opening right -->
  <path
    d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4"
    stroke="#4D71FA"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Signal dot — in the gap, right of the opening -->
  <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
</svg>
