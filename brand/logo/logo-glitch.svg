<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="gl-bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');

      /*
        Glitch fires at ~88–91% of a 5.5s cycle = every ~5.5s
        Two offset copies: red (Cortex Rose) shifted left, blue (Signal) shifted right
        Main logo stays visible throughout
      */

      /* Red channel — left offset */
      .gl-red {
        opacity: 0;
        fill: #F43F5E;
        animation: gl-r 5.5s step-end infinite;
      }
      /* Blue channel — right offset */
      .gl-blue {
        opacity: 0;
        fill: #4D71FA;
        animation: gl-b 5.5s step-end infinite;
      }
      /* Arc glitch layers */
      .gl-arc-red  { animation: gl-arc-r 5.5s step-end infinite; opacity:0; }
      .gl-arc-blue { animation: gl-arc-b 5.5s step-end infinite; opacity:0; }

      /* Slight vertical slice jump on the main icon */
      .gl-icon {
        animation: gl-icon-shake 5.5s step-end infinite;
      }

      @keyframes gl-r {
        0%,85%,87.5%,92%,100% { opacity:0; transform:translate(0,0); }
        85.5%                  { opacity:0.65; transform:translate(-5px, 1px); }
        86.5%                  { opacity:0.4;  transform:translate(-3px,-1px); }
        87%                    { opacity:0.7;  transform:translate(-6px, 0);   }
      }
      @keyframes gl-b {
        0%,85%,87.5%,92%,100% { opacity:0; transform:translate(0,0); }
        85.5%                  { opacity:0.5; transform:translate(4px,-1px);  }
        86.5%                  { opacity:0.7; transform:translate(6px, 0.5px); }
        87%                    { opacity:0.3; transform:translate(3px, 1px);   }
      }
      @keyframes gl-arc-r {
        0%,85%,87.5%,100% { opacity:0; }
        85.5%              { opacity:0.6; }
        86.5%              { opacity:0.3; }
      }
      @keyframes gl-arc-b {
        0%,85%,87.5%,100% { opacity:0; }
        85.5%              { opacity:0.5; }
        86.5%              { opacity:0.4; }
      }
      @keyframes gl-icon-shake {
        0%,85%,88%,100% { transform: translate(0,0); }
        85.5%            { transform: translate(1px,-2px); }
        86.5%            { transform: translate(-1px,1px); }
        87%              { transform: translate(2px,0); }
      }
    </style>
  </defs>

  <!-- ─── Icon ─────────────────────────────────────── -->
  <g class="gl-icon">
    <rect width="64" height="64" rx="14" fill="url(#gl-bg)"/>

    <!-- Red arc ghost (left-shifted) -->
    <path class="gl-arc-red"
      d="M 39.6,42.6 A 15,15 0 1,1 39.6,21.4"
      stroke="#F43F5E" stroke-width="5" stroke-linecap="round"
    />
    <!-- Blue arc ghost (right-shifted) -->
    <path class="gl-arc-blue"
      d="M 45.6,42.6 A 15,15 0 1,1 45.6,21.4"
      stroke="#4D71FA" stroke-width="5" stroke-linecap="round"
    />
    <!-- Main arc -->
    <path
      d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4"
      stroke="#4D71FA" stroke-width="5" stroke-linecap="round"
    />
    <circle cx="55" cy="32" r="2.5" fill="#4D71FA"/>
  </g>

  <!-- ─── Wordmark — base (always visible) ──────────── -->
  <text x="80" y="44"
    font-family="'Space Grotesk','Arial Black',sans-serif"
    font-weight="700" font-size="36" letter-spacing="0.8"
    fill="#F7F9FC"
  >Cortex</text>

  <!-- Red channel glitch overlay -->
  <text class="gl-red" x="80" y="44"
    font-family="'Space Grotesk','Arial Black',sans-serif"
    font-weight="700" font-size="36" letter-spacing="0.8"
  >Cortex</text>

  <!-- Blue channel glitch overlay -->
  <text class="gl-blue" x="80" y="44"
    font-family="'Space Grotesk','Arial Black',sans-serif"
    font-weight="700" font-size="36" letter-spacing="0.8"
  >Cortex</text>
</svg>
