<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="sg-bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');

      .sg-bg  { animation: sg-fade 0.3s ease both; }
      .sg-arc {
        stroke-dasharray: 71;
        stroke-dashoffset: 71;
        animation: sg-draw 0.85s cubic-bezier(0.4,0,0.2,1) 0.1s both;
      }
      .sg-dot {
        transform-box: fill-box;
        transform-origin: center;
        animation: sg-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.85s both;
      }

      /* Each letter â€” same animation, different delay via inline style */
      .sg-letter {
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: sg-letter 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
      }

      @keyframes sg-fade   { from { opacity:0; } to { opacity:1; } }
      @keyframes sg-draw   { to   { stroke-dashoffset: 0; } }
      @keyframes sg-pop    {
        from { transform: scale(0); opacity:0; }
        to   { transform: scale(1); opacity:1; }
      }
      @keyframes sg-letter {
        from { opacity:0; transform: translateY(22px); }
        to   { opacity:1; transform: translateY(0);    }
      }
    </style>
  </defs>

  <!-- Icon -->
  <rect class="sg-bg" width="64" height="64" rx="14" fill="url(#sg-bg)"/>
  <path class="sg-arc"
    d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4"
    stroke="#4D71FA" stroke-width="5" stroke-linecap="round"
  />
  <circle class="sg-dot" cx="55" cy="32" r="2.5" fill="#4D71FA"/>

  <!-- "Cortex" â€” each letter in its own <g>, staggered -->
  <!-- Space Grotesk Bold 36px: Câ‰ˆ24, oâ‰ˆ23, râ‰ˆ15, tâ‰ˆ14, eâ‰ˆ22, xâ‰ˆ22 -->
  <g class="sg-letter" style="animation-delay: 0.50s">
    <text x="80"  y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">C</text>
  </g>
  <g class="sg-letter" style="animation-delay: 0.60s">
    <text x="104" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">o</text>
  </g>
  <g class="sg-letter" style="animation-delay: 0.70s">
    <text x="127" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">r</text>
  </g>
  <g class="sg-letter" style="animation-delay: 0.80s">
    <text x="142" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">t</text>
  </g>
  <g class="sg-letter" style="animation-delay: 0.90s">
    <text x="156" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">e</text>
  </g>
  <g class="sg-letter" style="animation-delay: 1.00s">
    <text x="178" y="44" font-family="'Space Grotesk','Arial Black',sans-serif" font-weight="700" font-size="36" fill="#F7F9FC">x</text>
  </g>
</svg>
