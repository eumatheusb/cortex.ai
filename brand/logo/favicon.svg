<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Cortex">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#090E1A"/>

  <!-- C arc — center (16,16), r=8, gap ±45° right side -->
  <!-- Start: (16+8·cos45°, 16+8·sin45°) = (21.66, 21.66) -->
  <!-- End:   (21.66, 10.34) -->
  <path
    d="M 21.7,21.7 A 8,8 0 1,1 21.7,10.3"
    stroke="#4D71FA"
    stroke-width="2.8"
    stroke-linecap="round"
  />

  <!-- Signal dot -->
  <circle cx="27" cy="16" r="1.4" fill="#4D71FA"/>
</svg>
