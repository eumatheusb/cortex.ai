<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Cortex loading">
  <defs>
    <radialGradient id="ld-bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>
    <style>
      /* Spinning arc — full circle chase effect */
      .ld-track {
        opacity: 0.12;
      }

      /* The "chasing" arc: dasharray partial, rotates full 360° */
      .ld-spin {
        transform-box: fill-box;
        transform-origin: center;
        stroke-dasharray: 53 18;   /* 53 visible, 18 gap (270° drawn, 90° gap) */
        stroke-dashoffset: 0;
        animation: ld-rotate 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      /* Signal dot orbits the arc gap */
      .ld-dot {
        transform-box: fill-box;
        transform-origin: 32px 32px;   /* orbit center = icon center */
        animation: ld-orbit 1.1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes ld-rotate {
        to { transform: rotate(360deg); }
      }

      @keyframes ld-orbit {
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#ld-bg)"/>

  <!-- Full circle track (ghost) -->
  <circle
    class="ld-track"
    cx="32" cy="32" r="15"
    stroke="#4D71FA"
    stroke-width="5"
  />

  <!-- Spinning arc — 270° chase segment -->
  <circle
    class="ld-spin"
    cx="32" cy="32" r="15"
    stroke="#4D71FA"
    stroke-width="5"
    stroke-linecap="round"
  />

  <!-- Signal dot — orbits at the leading edge of the arc -->
  <!-- Positioned at (32+15, 32) = (47, 32), orbits with the spin -->
  <circle class="ld-dot" cx="47" cy="32" r="2.5" fill="#4D71FA"/>
</svg>
