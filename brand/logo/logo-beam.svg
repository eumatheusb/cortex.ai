<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 64" fill="none" role="img" aria-label="Cortex">
  <defs>
    <radialGradient id="bm-bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1B2845"/>
      <stop offset="100%" stop-color="#090E1A"/>
    </radialGradient>

    <!--
      Diagonal shimmer beam: narrow rect skewed -18°
      gradient: transparent → white peak → transparent
      sweeps left to right over the full logo, repeats every 3.5s
    -->
    <linearGradient id="bm-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="50%"  stop-color="#F7F9FC" stop-opacity="0.55"/>
      <stop offset="65%"  stop-color="#4D71FA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4D71FA" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="bm-clip">
      <rect width="264" height="64"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');

      /* Logo reveal on load */
      .bm-bg  { animation: bm-fade 0.35s ease both; }
      .bm-arc {
        stroke-dasharray: 71;
        stroke-dashoffset: 71;
        animation: bm-draw 0.9s cubic-bezier(0.4,0,0.2,1) 0.1s both;
      }
      .bm-dot {
        transform-box: fill-box;
        transform-origin: center;
        animation: bm-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.85s both;
      }
      .bm-text { animation: bm-slide 0.55s cubic-bezier(0.4,0,0.2,1) 0.55s both; }

      /* Shimmer beam — fires first at 1.5s, then every 3.5s */
      .bm-beam {
        animation: bm-sweep 3.5s cubic-bezier(0.4,0,0.4,1) 1.5s infinite;
      }

      @keyframes bm-fade  { from { opacity:0; } to { opacity:1; } }
      @keyframes bm-draw  { to { stroke-dashoffset: 0; } }
      @keyframes bm-pop   {
        from { transform:scale(0); opacity:0; }
        to   { transform:scale(1); opacity:1; }
      }
      @keyframes bm-slide {
        from { opacity:0; transform: translateX(-12px); }
        to   { opacity:1; transform: translateX(0); }
      }
      @keyframes bm-sweep {
        /* beam: starts hidden left, sweeps across, sits invisible on right */
        0%   { transform: skewX(-18deg) translateX(-120px); opacity:1; }
        40%  { transform: skewX(-18deg) translateX(340px);  opacity:1; }
        41%  { opacity:0; }
        100% { transform: skewX(-18deg) translateX(340px);  opacity:0; }
      }
    </style>
  </defs>

  <!-- Icon mark -->
  <rect class="bm-bg" width="64" height="64" rx="14" fill="url(#bm-bg)"/>
  <path class="bm-arc"
    d="M 42.6,42.6 A 15,15 0 1,1 42.6,21.4"
    stroke="#4D71FA" stroke-width="5" stroke-linecap="round"
  />
  <circle class="bm-dot" cx="55" cy="32" r="2.5" fill="#4D71FA"/>

  <!-- Wordmark -->
  <g class="bm-text">
    <text x="80" y="44"
      font-family="'Space Grotesk','Arial Black',sans-serif"
      font-weight="700" font-size="36" letter-spacing="0.8"
      fill="#F7F9FC"
    >Cortex</text>
  </g>

  <!-- Shimmer beam overlay (screen blend brightens whatever is below) -->
  <g clip-path="url(#bm-clip)" style="mix-blend-mode: screen">
    <rect
      class="bm-beam"
      x="-60" y="-10" width="80" height="84"
      fill="url(#bm-grad)"
    />
  </g>
</svg>
