  # ───────────────────────────────────────────────────────────────────────────
  # 30. BRAND APPLICATION GUIDE — DO'S & DON'TS
  # ───────────────────────────────────────────────────────────────────────────
  30_brand_dos_donts:
    id: "ENV-006"
    name: "Brand Application Guide — Do's & Don'ts"
    description: >
      Pagina de referencia rapida com regras de uso correto e incorreto
      da marca Cortex. Aplicavel a todos os materiais acima.

    logo_usage:
      dos:
        - "Usar logo horizontal como aplicacao primaria em 90% dos casos"
        - "Manter area de protecao minima de 1x a altura do icone Cx ao redor do logo"
        - "Usar wordmark-dark.svg sobre fundos escuros (#090E1A, #0C1220)"
        - "Usar wordmark-light.svg sobre fundos claros (#F7F9FC)"
        - "Usar icon-on-signal.svg quando o fundo for Signal Blue"
        - "Manter proporcoes originais — nunca distorcer"
        - "Tamanho minimo digital: wordmark 80px largura / icon 16px"
        - "Tamanho minimo impresso: wordmark 25mm largura / icon 5mm"

      donts:
        - "NUNCA rotacionar o logo"
        - "NUNCA adicionar sombra, brilho, gradiente ou efeito ao logo"
        - "NUNCA alterar as cores do logo (apenas variantes aprovadas)"
        - "NUNCA colocar logo sobre fundo fotografico sem overlay escuro (min 70% opacity)"
        - "NUNCA colocar logo sobre fundo colorido que nao seja Void, Ink, White ou Signal"
        - "NUNCA usar outline/stroke no logo — ele e sempre preenchido"
        - "NUNCA compactar o logo abaixo do tamanho minimo"
        - "NUNCA adicionar texto, tagline ou elementos conectados ao logo"
        - "NUNCA usar logo em orientacao vertical quando horizontal cabe no espaco"

    color_usage:
      dos:
        - "Dark mode first — Void e Ink sao os backgrounds padroes"
        - "Signal Blue apenas para CTAs, links, acentos e dados de destaque"
        - "Mist para textos secundarios e metadata"
        - "Semantic colors apenas em contexto correto (Success para positivo, Error para negativo)"
        - "Manter contraste WCAG AA minimo (4.5:1 para texto, 3:1 para elementos grandes)"

      donts:
        - "NUNCA usar Signal Blue como background de areas grandes (apenas acentos)"
        - "NUNCA usar cores fora da paleta definida"
        - "NUNCA usar gradientes multicoloridos"
        - "NUNCA usar opacidade abaixo de 60% para textos legais"
        - "NUNCA misturar cores semanticas (ex: Success + Error no mesmo badge)"

    typography_usage:
      dos:
        - "Space Grotesk para TODOS os titulos, headlines, CTAs e elementos de destaque"
        - "Inter para corpo de texto, descricoes, UI text"
        - "JetBrains Mono para numeros, metricas, dashboards, tabelas, codigos"
        - "Manter hierarquia clara: no maximo 3 niveis de peso por pagina"
        - "Respeitar a escala tipografica definida nos tokens"

      donts:
        - "NUNCA usar outra fonte alem das 3 definidas"
        - "NUNCA usar Space Grotesk Regular (400) — minimo 500 para display"
        - "NUNCA usar Inter Bold (700) — maximo 500 para body"
        - "NUNCA usar texto todo em UPPERCASE exceto em labels curtos (ex: 'CERTIFICADO')"
        - "NUNCA usar mais de 2 tamanhos de fonte diferentes em um unico card/componente"

    photography_imagery:
      dos:
        - "Fotografias com tonalidade escura e fria"
        - "Preferir ambientes com iluminacao low-key"
        - "Pessoas em contexto profissional, sem poses forcadas"
        - "Equipamentos e tecnologia — telas, dashboards, dados"
        - "Sobre fundos escuros, usar overlay Void 60-80%"

      donts:
        - "NUNCA usar fotos stock genericas com pessoas sorrindo artificialmente"
        - "NUNCA usar fotos com fundo branco/claro sem tratamento"
        - "NUNCA usar fotos de dentes, bocas ou cadeiras odontologicas"
        - "NUNCA usar ilustracoes cartoon ou flat illustration style"
        - "NUNCA usar icones coloridos ou emoji-style"

    tone_of_voice_in_materials:
      dos:
        - "Direto e confiante — nunca hesitante"
        - "Dado antes de adjetivo"
        - "Frases curtas, impactantes"
        - "Usar palavras do vocabulario aprovado: resultado, sistema, stack, operar, escalar"
        - "Provar antes de prometer"

      donts:
        - "NUNCA usar palavras proibidas: revolucionario, disruptivo, game-changer, jornada, incrivel"
        - "NUNCA usar tom motivacional ou coach"
        - "NUNCA usar emojis em materiais formais"
        - "NUNCA usar mais de 2 pontos de exclamacao em uma peca inteira"
        - "NUNCA fazer promessas sem dado comprovavel"

    material_finishing:
      dos:
        - "Acabamentos foscos/matte em TODOS os materiais fisicos"
        - "Gravacao a laser em metais — nunca adesivo"
        - "Hot stamping ou deboss para papeis premium"
        - "Bordado para vestuario — nunca serigrafia barata em pecas premium"
        - "Cores Pantone especificas para consistencia em impressao"

      donts:
        - "NUNCA usar acabamento brilhante/glossy em materiais Cortex"
        - "NUNCA usar adesivo vinil em produtos premium (squeeze, caneca)"
        - "NUNCA usar sublimacao full-color em vestuario (exceto desk mat)"
        - "NUNCA usar papeis finos (<250g) para materiais que vao para a mao do cliente"
        - "NUNCA usar dourado ou rose gold — paleta e prata/gunmetal/azul"


