metadata:
  schema: "cortex.brand-application-guide"
  version: "1.0"
  status: production
  brand: "Cortex"
  parent_group: "Grupo Fabio Avelar"
  created: "2026-03-22"
  squad: brand
  design_direction: "Minimalismo agressivo — dark-first, Signal Blue accents, premium finishes"
  archetype: "Governante 65% + Sabio 35%"

# ═══════════════════════════════════════════════════════════════════════════════
# GLOBAL REFERENCES
# ═══════════════════════════════════════════════════════════════════════════════

global_refs:
  colors:
    void: "#090E1A"
    ink: "#0C1220"
    dusk: "#1B2845"
    steel: "#1E2533"
    ash: "#4A5568"
    mist: "#94A3B8"
    white: "#F7F9FC"
    signal: "#4D71FA"
    signal_dark: "#3558D4"
    signal_light: "#7B96FB"
    signal_ghost: "rgba(77, 113, 250, 0.12)"
    success: "#22C55E"
    warning: "#F59E0B"
    error: "#F43F5E"

  typography:
    display: "Space Grotesk"
    body: "Inter"
    mono: "JetBrains Mono"

  logo_assets:
    primary_horizontal_dark: "outputs/brand/cortex/logo/logo-horizontal-dark.svg"
    primary_horizontal_light: "outputs/brand/cortex/logo/logo-horizontal-light.svg"
    vertical_dark: "outputs/brand/cortex/logo/logo-vertical-dark.svg"
    wordmark_dark: "outputs/brand/cortex/logo/wordmark-dark.svg"
    wordmark_light: "outputs/brand/cortex/logo/wordmark-light.svg"
    icon_dark: "outputs/brand/cortex/logo/icon-dark.svg"
    icon_light: "outputs/brand/cortex/logo/icon-light.svg"
    icon_on_signal: "outputs/brand/cortex/logo/icon-on-signal.svg"
    favicon: "outputs/brand/cortex/logo/favicon.svg"
    animated_reveal: "outputs/brand/cortex/logo/logo-reveal.svg"
    animated_loader: "outputs/brand/cortex/logo/logo-loader.svg"
    animated_scan: "outputs/brand/cortex/logo/logo-scan.svg"
    animated_beam: "outputs/brand/cortex/logo/logo-beam.svg"
    animated_ripple: "outputs/brand/cortex/logo/logo-ripple.svg"
    animated_glitch: "outputs/brand/cortex/logo/logo-glitch.svg"
    animated_idle: "outputs/brand/cortex/logo/logo-idle.svg"
    animated_stagger: "outputs/brand/cortex/logo/logo-stagger.svg"
    animated_typewriter: "outputs/brand/cortex/logo/logo-typewriter.svg"
    react_component: "outputs/brand/cortex/logo/CortexLogo.tsx"

  production_notes:
    color_profile_digital: "sRGB IEC61966-2.1"
    color_profile_print: "FOGRA39 (ISO 12647-2:2004) ou US Web Coated (SWOP) v2"
    pantone_void: "Pantone Black 6 C"
    pantone_signal: "Pantone 2726 C"
    pantone_mist: "Pantone Cool Gray 6 C"
    pantone_white: "Pantone 11-0602 TCX (Snow White)"
    cmyk_void: "C:85 M:75 K:100 Y:40"
    cmyk_signal: "C:75 M:55 Y:0 K:0"
    minimum_dpi_print: 300
    minimum_dpi_large_format: 150

# ═══════════════════════════════════════════════════════════════════════════════
# MATERIAIS DIGITAIS
# ═══════════════════════════════════════════════════════════════════════════════

digital:

  # ───────────────────────────────────────────────────────────────────────────
  # 01. LANDING PAGE
  # ───────────────────────────────────────────────────────────────────────────
  01_landing_page:
    id: "DIG-001"
    name: "Landing Page — Cortex"
    description: >
      Single-page dark-first landing com 5 secoes. Cada secao respira com
      espaco negativo generoso. Nenhum elemento decorativo gratuito. Cada
      pixel justifica sua existencia. Visual reference: Linear.app + Vercel.

    specs:
      viewport: "1440px design width, fluid responsive"
      max_content_width: "1200px"
      background: "#090E1A (Void)"
      grid: "12 colunas, 24px gutter, 80px margin lateral"

    sections:

      hero:
        description: >
          Full-viewport hero. Background Void puro sem imagem. Headline
          massiva centralizada. Abaixo, subline em Mist. CTA unico em
          Signal Blue com glow sutil. Logo horizontal dark no topo-esquerda
          do header fixo. Nav minimalista a direita: 4 links em Inter 500
          cor Mist, hover Signal. Subtle grid pattern (linhas Steel, 0.5px,
          opcidade 8%) preenche o background inteiro, simulando cockpit.
        layout:
          header_height: "72px"
          logo_position: "top-left, 80px from edge"
          logo_variant: "logo-horizontal-dark.svg"
          logo_height: "28px"
          nav_links: ["Produto", "Resultados", "Planos", "Falar com especialista"]
          nav_font: "Inter 500, 14px, #94A3B8"
          nav_hover: "#4D71FA"
        headline:
          text: "Do lead ao lucro. Um sistema."
          font: "Space Grotesk 700"
          size: "72px desktop / 48px tablet / 36px mobile"
          color: "#F7F9FC"
          line_height: "1.15"
          letter_spacing: "-0.02em"
          max_width: "800px"
          alignment: "center"
        subline:
          text: "Stack completa de crescimento para clinicas odontologicas. CRM proprio, IA proprietaria, resultado comprovavel."
          font: "Inter 400"
          size: "20px desktop / 18px mobile"
          color: "#94A3B8"
          line_height: "1.6"
          max_width: "580px"
          margin_top: "24px"
        cta:
          text: "Ver como funciona"
          font: "Space Grotesk 600, 16px"
          color: "#F7F9FC"
          background: "#4D71FA"
          hover_background: "#3558D4"
          padding: "16px 32px"
          border_radius: "8px"
          margin_top: "40px"
          shadow: "0 0 24px rgba(77, 113, 250, 0.3)"
          hover_shadow: "0 0 32px rgba(77, 113, 250, 0.45)"
        background_pattern:
          type: "grid"
          stroke: "#1E2533"
          stroke_width: "0.5px"
          opacity: 0.08
          cell_size: "64px"

      features:
        description: >
          4 cards em grid 2x2 sobre fundo Ink. Cada card tem fundo Dusk,
          border Steel 1px, radius 12px. Icone minimalista em Signal Blue
          (24x24, stroke-only, 1.5px stroke). Titulo em Space Grotesk 600
          branco. Descricao em Inter 400 Mist. Sem imagens, sem ilustracoes.
        background: "#0C1220"
        padding_section: "128px 0"
        section_title:
          text: "O que opera por voce"
          font: "Space Grotesk 600, 36px"
          color: "#F7F9FC"
          alignment: "center"
          margin_bottom: "64px"
        cards:
          layout: "2x2 grid, 24px gap"
          card_background: "#1B2845"
          card_border: "1px solid #1E2533"
          card_radius: "12px"
          card_padding: "32px"
          icon_size: "24px"
          icon_style: "stroke-only, 1.5px, #4D71FA"
          title_font: "Space Grotesk 600, 20px, #F7F9FC"
          title_margin_top: "20px"
          description_font: "Inter 400, 16px, #94A3B8"
          description_margin_top: "12px"
          description_line_height: "1.6"
          items:
            - title: "Cortex CRM"
              description: "Pipeline visual do lead ao contrato. Automacoes que disparam no timing certo."
            - title: "Cortex Ads"
              description: "Trafego pago integrado ao CRM. Lead qualificado, nao volume vazio."
            - title: "Cortex Analytics"
              description: "Dashboard unico do investimento ao faturamento. Dado antes de opiniao."
            - title: "Cortex Flow"
              description: "Automacao ponta a ponta. WhatsApp, email, follow-up — sem intervencao manual."

      social_proof:
        description: >
          Fundo Void. Uma unica metrica grande central em JetBrains Mono
          Bold Signal Blue, com label em Mist abaixo. Abaixo, 3 logos de
          clinicas em branco/mist (opacidade 40%). Minimalismo extremo:
          nenhum testimonial textual longo, apenas numeros.
        background: "#090E1A"
        padding_section: "96px 0"
        metric:
          value: "+230%"
          value_font: "JetBrains Mono 700, 72px"
          value_color: "#4D71FA"
          label: "crescimento medio de faturamento dos clientes Cortex"
          label_font: "Inter 400, 18px"
          label_color: "#94A3B8"
          label_margin_top: "16px"
        logos_row:
          count: 3
          style: "Monocromatico #94A3B8, opacidade 40%"
          height: "32px"
          gap: "48px"
          margin_top: "64px"

      pricing:
        description: >
          Fundo Ink. 2 cards lado a lado (nao 3 — minimalismo). Card
          recomendado tem border Signal Blue 1px com glow sutil. Preco em
          Space Grotesk Bold branco. Features listadas com checkmarks em
          Signal Blue. CTA primario no card principal, CTA ghost no secundario.
        background: "#0C1220"
        padding_section: "128px 0"
        section_title:
          text: "Planos"
          font: "Space Grotesk 600, 36px, #F7F9FC"
          alignment: "center"
          margin_bottom: "64px"
        cards:
          layout: "2 columns, 24px gap, max-width 800px, centered"
          standard:
            name: "Essencial"
            background: "#1B2845"
            border: "1px solid #1E2533"
            radius: "12px"
            padding: "40px"
            price_font: "Space Grotesk 700, 48px, #F7F9FC"
            period_font: "Inter 400, 14px, #94A3B8"
            features_font: "Inter 400, 16px, #94A3B8"
            check_color: "#4D71FA"
            cta_style: "ghost — border 1px #4D71FA, text #4D71FA, bg transparent"
            cta_text: "Comecar"
          recommended:
            name: "Cortex Pro"
            background: "#1B2845"
            border: "1px solid #4D71FA"
            radius: "12px"
            padding: "40px"
            glow: "0 0 24px rgba(77, 113, 250, 0.15)"
            badge: "Recomendado"
            badge_bg: "#4D71FA"
            badge_font: "Inter 500, 12px, #F7F9FC"
            badge_radius: "full"
            badge_padding: "4px 12px"
            price_font: "Space Grotesk 700, 48px, #F7F9FC"
            cta_style: "solid — bg #4D71FA, text #F7F9FC"
            cta_text: "Falar com especialista"

      cta_final:
        description: >
          Secao curta. Fundo Void. Uma frase impactante centralizada em
          Space Grotesk Bold. CTA abaixo. Nada mais. Nenhum elemento adicional.
        background: "#090E1A"
        padding_section: "128px 0"
        headline:
          text: "Seu concorrente ainda gerencia 4 fornecedores. Voce nao precisa."
          font: "Space Grotesk 700, 48px"
          color: "#F7F9FC"
          max_width: "700px"
          alignment: "center"
          line_height: "1.15"
        cta:
          text: "Agendar demonstracao"
          style: "Identico ao hero CTA"
          margin_top: "40px"

      footer:
        description: >
          Minimalista. Fundo Ink. Logo wordmark dark a esquerda. Links em
          colunas a direita em Inter 400 Mist. Linha separadora Steel 1px.
          Copyright em Inter 400 12px Ash.
        background: "#0C1220"
        padding: "64px 80px 32px"
        logo: "wordmark-dark.svg"
        logo_height: "20px"
        columns:
          - title: "Produto"
            links: ["CRM", "Ads", "Analytics", "Flow"]
          - title: "Empresa"
            links: ["Sobre", "Contato", "Carreiras"]
          - title: "Legal"
            links: ["Termos", "Privacidade"]
        link_font: "Inter 400, 14px, #94A3B8"
        link_hover: "#F7F9FC"
        column_title_font: "Inter 500, 14px, #F7F9FC"
        divider: "1px solid #1E2533"
        divider_margin: "32px 0"
        copyright:
          text: "2026 Cortex. Grupo Fabio Avelar."
          font: "Inter 400, 12px, #4A5568"

  # ───────────────────────────────────────────────────────────────────────────
  # 02. DASHBOARD MOCKUP
  # ───────────────────────────────────────────────────────────────────────────
  02_dashboard_mockup:
    id: "DIG-002"
    name: "Dashboard CRM Mockup"
    description: >
      Mockup high-fidelity de um dashboard Cortex CRM. Dados ficticios
      realistas. Visual de cockpit: denso em informacao mas limpo.
      Dark mode exclusivo. Todas as metricas em JetBrains Mono.

    specs:
      dimensions: "1440x900px (desktop viewport)"
      format: "PNG @2x (2880x1800px exportado), Figma source"
      background: "#090E1A"

    layout:
      sidebar:
        width: "240px"
        background: "#0C1220"
        border_right: "1px solid #1E2533"
        logo: "icon-dark.svg at top, 32px padding, 24px icon"
        nav_items:
          - { label: "Dashboard", icon: "grid", active: true }
          - { label: "Pipeline", icon: "kanban" }
          - { label: "Contatos", icon: "users" }
          - { label: "Campanhas", icon: "zap" }
          - { label: "Analytics", icon: "bar-chart" }
          - { label: "Configuracoes", icon: "settings" }
        nav_font: "Inter 500, 14px"
        nav_color_default: "#94A3B8"
        nav_color_active: "#F7F9FC"
        nav_active_bg: "rgba(77, 113, 250, 0.12)"
        nav_active_indicator: "3px left border #4D71FA"
        nav_icon_size: "18px"
        nav_item_padding: "10px 16px"
        nav_gap: "4px"

      topbar:
        height: "64px"
        background: "#090E1A"
        border_bottom: "1px solid #1E2533"
        left_content: "Bom dia, Dr. Fabio — Space Grotesk 600, 18px, #F7F9FC"
        right_content: "Search input (Steel bg, Mist placeholder) + notification bell + avatar circle"
        search_width: "280px"
        search_bg: "#1E2533"
        search_radius: "8px"
        search_placeholder: "Buscar contatos, campanhas..."
        search_font: "Inter 400, 14px, #94A3B8"

      kpi_row:
        description: "4 KPI cards em linha, gap 16px"
        card_bg: "#1B2845"
        card_border: "1px solid #1E2533"
        card_radius: "12px"
        card_padding: "24px"
        cards:
          - label: "Leads este mes"
            value: "1.247"
            trend: "+18%"
            trend_color: "#22C55E"
          - label: "Taxa de conversao"
            value: "23,4%"
            trend: "+2.1pp"
            trend_color: "#22C55E"
          - label: "Faturamento"
            value: "R$ 487.200"
            trend: "+31%"
            trend_color: "#22C55E"
          - label: "CAC"
            value: "R$ 142"
            trend: "-12%"
            trend_color: "#22C55E"
        value_font: "JetBrains Mono 700, 30px, #F7F9FC"
        label_font: "Inter 400, 14px, #94A3B8"
        trend_font: "JetBrains Mono 500, 14px"

      main_chart:
        description: >
          Area chart — receita mensal (ultimos 12 meses). Linha Signal Blue
          2px com fill gradient (Signal 20% -> transparent). Grid lines
          Steel 0.5px horizontal. Eixo Y em JetBrains Mono 12px Ash.
          Eixo X em Inter 12px Ash. Tooltip com fundo Dusk, border Steel.
        chart_bg: "#1B2845"
        chart_border: "1px solid #1E2533"
        chart_radius: "12px"
        chart_padding: "24px"
        line_color: "#4D71FA"
        line_width: "2px"
        fill_gradient: "linear-gradient(to bottom, rgba(77,113,250,0.2), transparent)"
        grid_color: "#1E2533"
        grid_width: "0.5px"
        axis_font: "JetBrains Mono 400, 12px, #4A5568"

      pipeline_mini:
        description: >
          Mini kanban com 4 colunas (Novo, Qualificado, Proposta, Fechado).
          Cards pequenos com nome + valor em JetBrains Mono. Total por
          coluna no header.
        columns: ["Novo (23)", "Qualificado (15)", "Proposta (8)", "Fechado (12)"]
        column_bg: "#0C1220"
        column_radius: "8px"
        card_bg: "#1B2845"
        card_radius: "8px"
        card_padding: "12px"
        card_name_font: "Inter 500, 13px, #F7F9FC"
        card_value_font: "JetBrains Mono 400, 12px, #94A3B8"

  # ───────────────────────────────────────────────────────────────────────────
  # 03. APP MOBILE MOCKUP
  # ───────────────────────────────────────────────────────────────────────────
  03_app_mobile_mockup:
    id: "DIG-003"
    name: "App Mobile Mockup — 3 telas"
    description: >
      3 telas de app mobile Cortex CRM. iPhone 15 Pro frame.
      Dark mode exclusivo. Status bar branca. Navegacao bottom tab.

    specs:
      device_frame: "iPhone 15 Pro (393x852px logical)"
      export: "PNG @3x para mockup, Figma source"
      status_bar: "White text, system icons"
      safe_area_top: "59px"
      safe_area_bottom: "34px"
      background: "#090E1A"

    screens:

      tela_01_home:
        name: "Home / Dashboard resumo"
        description: >
          Saudacao no topo (Space Grotesk 600, 24px, White). Abaixo, 2 KPI
          cards lado a lado (Dusk bg, radius 12px). Grafico sparkline de
          faturamento semanal (Signal Blue line, sem eixos). Lista de
          ultimos leads (avatar circle Dusk, nome Inter 500 White, fonte
          Inter 400 Mist, timestamp Ash). Bottom tab bar: Home (ativo),
          Pipeline, Contatos, Mais.
        bottom_tab:
          background: "#0C1220"
          border_top: "1px solid #1E2533"
          active_color: "#4D71FA"
          inactive_color: "#4A5568"
          icon_size: "22px"
          label_font: "Inter 500, 10px"
          items: ["Home", "Pipeline", "Contatos", "Mais"]
        kpi_cards:
          - { label: "Leads hoje", value: "47", font: "JetBrains Mono 700, 24px, #F7F9FC" }
          - { label: "Receita mes", value: "R$ 487K", font: "JetBrains Mono 700, 24px, #F7F9FC" }

      tela_02_pipeline:
        name: "Pipeline — Kanban horizontal scroll"
        description: >
          Header com titulo "Pipeline" (Space Grotesk 600, 20px, White) e
          filtro dropdown a direita (Dusk bg, Mist text). Kanban com scroll
          horizontal. Cada coluna: header com label + count + cor indicator
          (4px dot). Cards com nome do lead, valor em JetBrains Mono,
          indicador de fonte (Meta/Google/Organico) como badge pequeno.
        column_header_font: "Inter 600, 14px, #F7F9FC"
        column_count_font: "JetBrains Mono 400, 14px, #94A3B8"
        lead_card:
          bg: "#1B2845"
          radius: "10px"
          padding: "16px"
          name_font: "Inter 500, 15px, #F7F9FC"
          value_font: "JetBrains Mono 400, 13px, #94A3B8"
          badge_bg: "rgba(77, 113, 250, 0.12)"
          badge_font: "Inter 500, 11px, #4D71FA"
          badge_radius: "full"

      tela_03_lead_detail:
        name: "Lead Detail"
        description: >
          Header com back arrow + nome do lead (Space Grotesk 600, 20px).
          Avatar grande (48px circle, Dusk bg, initials White). Secao de
          dados: telefone, email, valor estimado, fonte, score (barra
          horizontal Signal Blue fill sobre Steel bg). Timeline de
          interacoes abaixo: icones de acao (ligacao, whatsapp, email) +
          timestamp. CTA fixo no bottom: "Enviar proposta" btn Signal Blue.
        data_labels: "Inter 400, 13px, #94A3B8"
        data_values: "Inter 500, 15px, #F7F9FC"
        score_bar:
          height: "6px"
          bg: "#1E2533"
          fill: "#4D71FA"
          radius: "full"
        timeline_item:
          icon_size: "16px"
          icon_color: "#94A3B8"
          text_font: "Inter 400, 14px, #94A3B8"
          time_font: "Inter 400, 12px, #4A5568"
        bottom_cta:
          text: "Enviar proposta"
          bg: "#4D71FA"
          font: "Space Grotesk 600, 16px, #F7F9FC"
          radius: "12px"
          height: "52px"
          margin: "16px horizontal"

  # ───────────────────────────────────────────────────────────────────────────
  # 04. OG IMAGE / SOCIAL CARD
  # ───────────────────────────────────────────────────────────────────────────
  04_og_image:
    id: "DIG-004"
    name: "OG Image / Social Card"
    description: >
      Imagem de compartilhamento para link previews (Twitter, LinkedIn,
      WhatsApp, Slack). Fundo Void com grid pattern sutil. Logo horizontal
      top-left. Headline centralizado. Sem fotos, sem ilustracoes.

    specs:
      dimensions: "1200x630px"
      format: "PNG, <300KB otimizado"
      safe_zone: "Manter conteudo critico 80px de cada borda (WhatsApp cropa laterais)"

    layout:
      background: "#090E1A"
      grid_pattern:
        type: "dot grid"
        color: "#1E2533"
        opacity: 0.15
        dot_size: "2px"
        gap: "32px"
      logo:
        asset: "logo-horizontal-dark.svg"
        position: "top-left, 60px from edges"
        height: "28px"
      headline:
        text: "Do lead ao lucro. Um sistema."
        font: "Space Grotesk 700, 52px"
        color: "#F7F9FC"
        position: "center-center, vertically offset -20px"
        max_width: "900px"
        line_height: "1.15"
      tagline:
        text: "cortex.com.br"
        font: "Inter 500, 18px"
        color: "#4D71FA"
        position: "below headline, margin-top 24px"
      accent_line:
        description: "Linha horizontal 120px x 2px em Signal Blue, centrada abaixo do headline"
        width: "120px"
        height: "2px"
        color: "#4D71FA"
        margin_top: "20px"

  # ───────────────────────────────────────────────────────────────────────────
  # 05. FAVICON PACK
  # ───────────────────────────────────────────────────────────────────────────
  05_favicon_pack:
    id: "DIG-005"
    name: "Favicon Pack Completo"
    description: >
      Pack completo de favicons para todas as plataformas. Icone Cx
      geometrico sobre fundo Signal Blue (para contraste em abas de browser)
      ou transparente para contextos escuros.

    source: "outputs/brand/cortex/logo/favicon.svg"
    source_icon: "outputs/brand/cortex/logo/icon-dark.svg"

    deliverables:
      - file: "favicon.ico"
        sizes: "16x16, 32x32, 48x48 (multi-size ICO)"
        background: "#4D71FA"
        icon_color: "#F7F9FC"
        notes: "ICO multi-resolution para browsers legados"

      - file: "favicon-32.png"
        size: "32x32px"
        background: "#4D71FA"
        icon_color: "#F7F9FC"

      - file: "favicon-16.png"
        size: "16x16px"
        background: "#4D71FA"
        icon_color: "#F7F9FC"
        notes: "Simplificar icone ao maximo neste tamanho — apenas Cx"

      - file: "favicon.svg"
        notes: "SVG com media query para dark/light mode do browser"
        light_mode: { bg: "#4D71FA", icon: "#F7F9FC" }
        dark_mode: { bg: "transparent", icon: "#F7F9FC" }

      - file: "apple-touch-icon.png"
        size: "180x180px"
        background: "#090E1A"
        icon_color: "#F7F9FC"
        padding: "20% inset"
        radius: "Nao — iOS aplica mask automaticamente"

      - file: "android-chrome-192.png"
        size: "192x192px"
        background: "#090E1A"
        icon_color: "#F7F9FC"
        maskable_safe_zone: "80% centered"

      - file: "android-chrome-512.png"
        size: "512x512px"
        background: "#090E1A"
