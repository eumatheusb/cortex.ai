handoff:
  to_design_squad:
    action: "Implementar no Figma todos os templates digitais (01-12)"
    priority: "Alta — landing page e social media kit primeiro"
    figma_structure: >
      Criar Figma file 'Cortex — Brand Application' com pages:
      Digital Templates | Ad Templates | Social Media Kit | Presentation Deck |
      Email Templates | Mobile App | Dashboard

  to_production:
    action: "Orcamentar e produzir materiais fisicos (13-24) e ambientais (25-30)"
    priority: "Media — cartao de visita e adesivos primeiro"
    notes: >
      Solicitar amostras fisicas antes de aprovar lote.
      Validar cores Pantone em prova de impressao.
      Testar bordado em amostra de tecido real.

  to_dev:
    action: "Implementar landing page e email templates usando tokens do design system"
    tokens_ref: "outputs/design-system/cortex/tokens/tokens.yaml"
    component_ref: "outputs/brand/cortex/logo/CortexLogo.tsx"
